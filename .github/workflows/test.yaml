name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps (ci with fallback)
        shell: bash
        run: |
          set -e
          npm config set optional true
          npm i || (
            echo "npm ci failed; applying Rollup optional-deps workaround..."
            rm -rf node_modules package-lock.json ~/.npm/_cacache
            npm install --no-audit --no-fund
          )

      - run: npm run test