name: Lint

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies if cache missed
        run: |
          if [ ! -d node_modules ]; then
            npm install
          fi

      - name: Run linter
        run: npm run lint
