name: Lint

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Clean install (remove node_modules + lockfile cache)
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - run: npm run lint
