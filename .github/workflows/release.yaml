name: Release

on:
  workflow_run:
    workflows: ["Setup Dependencies"]
    types:
      - completed
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: npm ci                 # installs devDependencies (incl. @types/*)
      - run: npm run build          # creates lib/esm and lib/cjs
      - run: npm pack --dry-run     # optional: verify tarball includes lib/**

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}