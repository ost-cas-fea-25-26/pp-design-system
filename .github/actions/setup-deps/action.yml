name: Setup deps (npm + cache)
description: Restore npm cache and install dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: |
          package-lock.json
          **/package-lock.json

    - name: Install deps (npm ci)
      shell: bash
      run: npm ci